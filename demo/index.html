<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>SensiDemo Demo</title>
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: #f5f7fb;
        color: #202635;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      main {
        max-width: 1180px;
        margin: 0 auto;
        padding: 40px 24px;
      }

      header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 20px;
        margin-bottom: 24px;
      }

      h1 {
        margin: 0 0 6px;
        font-size: 28px;
        letter-spacing: 0;
      }

      p {
        margin: 0;
        color: #667085;
      }

      button {
        min-height: 38px;
        padding: 0 14px;
        border: 1px solid #d7deea;
        border-radius: 7px;
        background: #ffffff;
        cursor: pointer;
        font-weight: 700;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(190px, 1fr));
        gap: 16px;
      }

      .card {
        min-height: 220px;
        padding: 22px 16px;
        border: 1px solid #d9e0eb;
        border-radius: 8px;
        background: #ffffff;
        text-align: center;
      }

      .avatar {
        width: 76px;
        height: 76px;
        margin: 0 auto 14px;
        border-radius: 50%;
        object-fit: cover;
      }

      .name {
        color: #202635;
        font-weight: 800;
      }

      .role {
        margin-top: 6px;
        font-size: 13px;
        line-height: 1.35;
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <div>
          <h1>All connections</h1>
          <p>Demo page for testing single rules and list/grid rules.</p>
        </div>
        <button id="addCard" type="button">Add contact</button>
      </header>

      <section class="grid" data-testid="connections-grid">
        <article class="card" data-testid="connection-card">
          <img class="avatar" src="https://i.pravatar.cc/160?img=32" alt="Valeria">
          <div class="name">Valeria Fiorenza Perris</div>
          <p class="role">Psicologa, Psicoterapeuta e Clinical Lead</p>
        </article>
        <article class="card" data-testid="connection-card">
          <img class="avatar" src="https://i.pravatar.cc/160?img=12" alt="Gabriele">
          <div class="name">Gabriele Rapone</div>
          <p class="role">Product Designer</p>
        </article>
        <article class="card" data-testid="connection-card">
          <img class="avatar" src="https://i.pravatar.cc/160?img=47" alt="Carolina">
          <div class="name">Carolina Carvalhas</div>
          <p class="role">Strategy & Corp Dev Manager</p>
        </article>
      </section>
    </main>

    <script>
      const grid = document.querySelector("[data-testid='connections-grid']");
      const names = ["Maya Carter", "Noah Bennett", "Ava Mitchell", "Leo Foster"];
      const roles = ["Software Engineer", "B2B Growth Lead", "Business Development Representative", "Senior Product Manager"];
      let index = 0;

      document.getElementById("addCard").addEventListener("click", () => {
        const name = names[index % names.length];
        const role = roles[index % roles.length];
        const card = document.createElement("article");
        card.className = "card";
        card.dataset.testid = "connection-card";
        card.innerHTML = `
          <img class="avatar" src="https://i.pravatar.cc/160?img=${20 + index}" alt="${name}">
          <div class="name">${name}</div>
          <p class="role">${role}</p>
        `;
        grid.append(card);
        index += 1;
      });
    </script>
  </body>
</html>
